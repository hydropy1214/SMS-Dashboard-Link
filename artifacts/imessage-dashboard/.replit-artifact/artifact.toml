kind = "web"
previewPath = "/"
title = "iMessage Dashboard"
version = "1.0.0"
id = "artifacts/imessage-dashboard"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19795

[services.development]
run = "pnpm --filter @workspace/imessage-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/imessage-dashboard", "run", "build" ]
serve = "static"
publicDir = "artifacts/imessage-dashboard/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19795"
BASE_PATH = "/"
